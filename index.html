<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flag Quiz Challenge</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #f0fdfa 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; min-height: 100%;
  }
  .card {
    background: #fff; border-radius: 24px; padding: 28px; width: 100%;
    max-width: 460px; box-shadow: 0 20px 50px rgba(15,23,42,0.12); text-align: center;
  }
  h1 { margin: 0 0 8px; color: #0f172a; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .pill { font-size: 13px; font-weight: 700; padding: 6px 12px; border-radius: 99px; background: #eff6ff; color: #2563eb; }
  .pill.score { background: #ecfdf5; color: #059669; }
  .progress { width: 100%; height: 8px; background: #e2e8f0; border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress > div { height: 100%; background: #3b82f6; transition: width 0.3s; }
  .timer-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .timer-bar { flex: 1; height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .timer-bar > div { height: 100%; width: 100%; background: #3b82f6; }
  .timer-num { font-size: 13px; font-weight: 800; color: #2563eb; min-width: 34px; text-align: right; }
  .flag-box {
    width: 100%; height: 170px; background: #f8fafc; border-radius: 14px;
    border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .flag-img { max-height: 100%; max-width: 100%; object-fit: contain; display: block; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
  .flag-emoji { font-size: 110px; line-height: 1; }
  .prompt { color: #64748b; margin: 16px 0 18px; font-size: 15px; font-weight: 600; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    padding: 16px 18px; border-radius: 14px; border: 2px solid #e2e8f0; background: #fff;
    color: #0f172a; font-size: 17px; font-weight: 600; text-align: left; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .opt.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; }
  .opt.wrong { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
  .opt.dim { color: #94a3b8; }
  .opt:disabled { cursor: default; }
  .intro { color: #64748b; margin: 0 0 8px; font-size: 16px; line-height: 1.5; }
  .seg-label { font-size: 12px; font-weight: 800; color: #94a3b8; letter-spacing: 0.6px; text-transform: uppercase; margin: 22px 0 8px; text-align: left; }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 12px 0; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff;
    color: #0f172a; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .seg button.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .big-emoji { font-size: 64px; margin-bottom: 8px; }
  .final-score { font-size: 28px; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
  .rank { font-size: 20px; font-weight: 600; color: #3b82f6; margin: 0 0 18px; }
  .best-line { font-size: 14px; font-weight: 700; color: #64748b; margin: 14px 0 0; min-height: 18px; }
  .newbest { font-size: 15px; font-weight: 800; color: #059669; margin: 14px 0 0; }
  .reset-link { font-size: 12px; color: #94a3b8; margin: 18px 0 0; cursor: pointer; text-decoration: underline; }
  .btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none; background: #3b82f6;
    color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 20px rgba(59,130,246,0.35); font-family: inherit; margin-top: 26px;
  }
  .btn.secondary {
    background: #fff; color: #3b82f6; border: 2px solid #3b82f6; box-shadow: none; margin-top: 12px;
  }
  .share-note { font-size: 13px; color: #059669; font-weight: 700; margin: 14px 0 0; min-height: 16px; }
</style>
</head>
<body>
<div id="app"></div>
<script>

  {code:"es",name:"Spain"},{code:"lk",name:"Sri Lanka"},{code:"sd",name:"Sudan"},

  {code:"th",name:"Thailand"},{code:"tl",name:"Timor-Leste"},{code:"tg",name:"Togo"},
  {code:"to",name:"Tonga"},{code:"tt",name:"Trinidad and Tobago"},{code:"tn",name:"Tunisia"},
  {code:"tr",name:"Turkey"},{code:"tm",name:"Turkmenistan"},{code:"tv",name:"Tuvalu"},
  {code:"ug",name:"Uganda"},{code:"ua",name:"Ukraine"},{code:"ae",name:"United Arab Emirates"},
  {code:"gb",name:"United Kingdom"},{code:"us",name:"United States"},{code:"uy",name:"Uruguay"},
  {code:"uz",name:"Uzbekistan"},{code:"vu",name:"Vanuatu"},{code:"va",name:"Vatican City"},
  {code:"ve",name:"Venezuela"},{code:"vn",name:"Vietnam"},{code:"ye",name:"Yemen"},
  {code:"zm",name:"Zambia"},{code:"zw",name:"Zimbabwe"},
];

const LOOKALIKE_GROUPS = [
  ["td","ro","ad","md"], ["id","mc","pl"], ["nl","lu","ru"], ["si","sk","rs","ru"],
  ["ie","ci","it","mx"], ["no","is","dk","se","fi"], ["co","ec","ve"], ["ae","kw","jo","sd"],
  ["eg","iq","sy","ye"], ["ml","gn","sn","cm"], ["au","nz"], ["ar","uy"],
  ["sv","ni","hn"], ["in","ne"], ["qa","bh"], ["cr","th"],
];
const GROUPS_BY_CODE = {};
LOOKALIKE_GROUPS.forEach(g => g.forEach(c => { (GROUPS_BY_CODE[c] = GROUPS_BY_CODE[c] || []).push(g); }));

const LOOKALIKE_CHANCE = 0.35;
const LENGTH_OPTIONS = [15, 20, 25, 30];
const CHOICE_OPTIONS = [3, 4, 5, "random"];
const TIME_OPTIONS = [0, 5, 10, 15]; // 0 = Off
const STORE_KEY = "flagquiz_highscores";

// ----- state -----
let roundLength = 30;
let numChoices = 3;      // 3, 4, 5, or "random"
let timeLimit = 0;       // seconds, 0 = no timer
let round = [], idx = 0, score = 0, locked = false, timerId = null;

// ----- high score storage (per settings combo) -----
function bestKey() {
  return roundLength + "|" + (numChoices === "random" ? "R" : numChoices) + "|" + timeLimit;
}
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (e) { return {}; }
}
function getBest(key) { return loadScores()[key] || null; }
function recordScore(key, sc, total) {
  const all = loadScores();
  const prev = all[key];
  if (!prev || sc > prev.score) {
    all[key] = { score: sc, total: total };
    try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch (e) {}
  }
}
function resetScores() {
  try { localStorage.removeItem(STORE_KEY); } catch (e) {}
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildRound(length, choices) {
  const picks = shuffle(COUNTRIES).slice(0, length);
  return picks.map(correct => {
    const total = choices === "random" ? (3 + Math.floor(Math.random() * 3)) : choices;
    const decoyCount = total - 1;
    let decoys = [];
    const groups = GROUPS_BY_CODE[correct.code];
    if (groups && Math.random() < LOOKALIKE_CHANCE) {
      const group = groups[Math.floor(Math.random() * groups.length)];
      decoys = shuffle(COUNTRIES.filter(c => c.code !== correct.code && group.includes(c.code))).slice(0, decoyCount);
    }
    if (decoys.length < decoyCount) {
      const used = new Set([correct.code, ...decoys.map(d => d.code)]);
      decoys = decoys.concat(shuffle(COUNTRIES.filter(c => !used.has(c.code))).slice(0, decoyCount - decoys.length));
    }
    return { correct, options: shuffle([correct, ...decoys]) };
  });
}

function getRank(sc, length) {
  const p = sc / length;
  if (p === 1) return { title: "Flawless! Geography Legend", emoji: "🏆" };
  if (p >= 0.9) return { title: "Geography Whiz", emoji: "🌟" };
  if (p >= 0.75) return { title: "Globe Trotter", emoji: "✈️" };
  if (p >= 0.6) return { title: "Map Reader", emoji: "🗺️" };
  if (p >= 0.4) return { title: "Casual Explorer", emoji: "🧭" };
  return { title: "Just Getting Started", emoji: "🌱" };
}

function makeFlag(code) {
  const sources = [
    "https://flagcdn.com/w640/" + code + ".png",
    "https://flagicons.lipis.dev/flags/4x3/" + code + ".svg",
    "https://hatscripts.github.io/circle-flags/flags/" + code + ".svg",
  ];
  let i = 0;
  const img = document.createElement("img");
  img.className = "flag-img";
  img.alt = "Flag to identify";
  img.src = sources[0];
  img.onerror = () => {
    i++;
    if (i < sources.length) { img.src = sources[i]; }
    else {
      const span = document.createElement("span");
      span.className = "flag-emoji";
      span.textContent = code.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
      img.replaceWith(span);
    }
  };
  return img;
}

const app = document.getElementById("app");

function buildSeg(container, options, currentVal, labelFn, onSelect) {
  options.forEach(opt => {
    const b = document.createElement("button");
    b.textContent = labelFn(opt);
    if (opt === currentVal) b.classList.add("active");
    b.onclick = () => {
      onSelect(opt);
      container.querySelectorAll("button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      updateBestLine();
    };
    container.appendChild(b);
  });
}

function updateBestLine() {
  const el = document.getElementById("bestLine");
  if (!el) return;
  const best = getBest(bestKey());
  el.textContent = best ? ("Best for this mode: " + best.score + "/" + best.total) : "No score yet for this mode";
}

function renderStart() {
  clearTimer();
  app.innerHTML =
    '<div class="card">' +
      '<div class="big-emoji">🌍</div>' +
      '<h1 style="font-size:32px;font-weight:800;">Flag Quiz Challenge</h1>' +
      '<p class="intro">Pick your settings, then test your geography.</p>' +
      '<div class="seg-label">Number of flags</div>' +
      '<div class="seg" id="lengthSeg"></div>' +
      '<div class="seg-label">Choices per flag</div>' +
      '<div class="seg" id="choiceSeg"></div>' +
      '<div class="seg-label">Time per flag</div>' +
      '<div class="seg" id="timeSeg"></div>' +
      '<p class="best-line" id="bestLine"></p>' +
      '<button class="btn" id="startBtn">Start Round</button>' +
      '<p class="reset-link" id="resetLink">Reset best scores</p>' +
    '</div>';

  buildSeg(document.getElementById("lengthSeg"), LENGTH_OPTIONS, roundLength, n => n, n => { roundLength = n; });
  buildSeg(document.getElementById("choiceSeg"), CHOICE_OPTIONS, numChoices, c => c === "random" ? "Random" : c, c => { numChoices = c; });
  buildSeg(document.getElementById("timeSeg"), TIME_OPTIONS, timeLimit, t => t === 0 ? "Off" : t + "s", t => { timeLimit = t; });
  updateBestLine();

  document.getElementById("startBtn").onclick = startRound;
  document.getElementById("resetLink").onclick = () => { resetScores(); updateBestLine(); };
}

function startRound() {
  round = buildRound(roundLength, numChoices); idx = 0; score = 0; locked = false;
  renderQuestion();
}

function clearTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

function startTimer() {
  const total = timeLimit;
  const fill = document.getElementById("timerFill");
  const num = document.getElementById("timerNum");
  const startAt = Date.now();
  function tick() {
    const remaining = Math.max(0, total - (Date.now() - startAt) / 1000);
    if (fill) fill.style.width = (remaining / total) * 100 + "%";
    if (num) num.textContent = Math.ceil(remaining) + "s";
    if (remaining <= 3) {
      if (fill) fill.style.background = "#ef4444";
      if (num) num.style.color = "#ef4444";
    }
    if (remaining <= 0) { clearTimer(); timeUp(); }
  }
  tick();
  timerId = setInterval(tick, 100);
}

function renderQuestion() {
  clearTimer();
  const q = round[idx];
  locked = false;
  const timerHtml = timeLimit > 0
    ? '<div class="timer-wrap"><div class="timer-bar"><div id="timerFill"></div></div><span class="timer-num" id="timerNum">' + timeLimit + 's</span></div>'
    : '';
  app.innerHTML =
    '<div class="card">' +
      '<div class="topbar">' +
        '<span class="pill">Question ' + (idx + 1) + ' / ' + roundLength + '</span>' +
        '<span class="pill score">Score: ' + score + '</span>' +
      '</div>' +
      '<div class="progress"><div style="width:' + ((idx / roundLength) * 100) + '%"></div></div>' +
      timerHtml +
      '<div class="flag-box" id="flagBox"></div>' +
      '<p class="prompt">Which country is this?</p>' +
      '<div class="options" id="options"></div>' +
    '</div>';

  document.getElementById("flagBox").appendChild(makeFlag(q.correct.code));

  const optWrap = document.getElementById("options");
  q.options.forEach(opt => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = opt.name;
    b.onclick = () => pick(opt, b);
    optWrap.appendChild(b);
  });

  if (timeLimit > 0) startTimer();
}

function revealCorrect(pickedBtn) {
  const q = round[idx];
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct.name) b.classList.add("correct");
    else if (b === pickedBtn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
}

function pick(option, btn) {
  if (locked) return;
  locked = true;
  clearTimer();
  revealCorrect(btn);
  if (option.code === round[idx].correct.code) score++;
  setTimeout(advance, 1100);
}

function timeUp() {
  if (locked) return;
  locked = true;
  revealCorrect(null);
  setTimeout(advance, 1300);
}

function advance() {
  if (idx + 1 >= roundLength) renderDone();
  else { idx++; renderQuestion(); }
}

function renderDone() {
  clearTimer();
  const rank = getRank(score, roundLength);
  const key = bestKey();
  const prev = getBest(key);
  const isNewBest = !prev || score > prev.score;
  recordScore(key, score, roundLength);
  const best = getBest(key);
  const bestHtml = isNewBest
    ? '<p class="newbest">🎉 New personal best for this mode!</p>'
    : '<p class="best-line">Best for this mode: ' + best.score + '/' + best.total + '</p>';

  app.innerHTML =
    '<div class="card">' +
      '<div class="big-emoji">' + rank.emoji + '</div>' +
      '<p class="final-score">' + score + ' / ' + roundLength + '</p>' +
      '<p class="rank">' + rank.title + '</p>' +
      bestHtml +
      '<button class="btn" id="againBtn">Play Again</button>' +
      '<button class="btn secondary" id="shareBtn">Share my score</button>' +
      '<p class="share-note" id="shareNote"></p>' +
    '</div>';
  document.getElementById("againBtn").onclick = renderStart;
  document.getElementById("shareBtn").onclick = shareScore;
}

function shareScore() {
  const rank = getRank(score, roundLength);
  const choiceLabel = numChoices === "random" ? "random choices" : numChoices + " choices";
  const settings = roundLength + " flags · " + choiceLabel + " · " + (timeLimit === 0 ? "no timer" : timeLimit + "s");
  const text = "🌍 Flag Quiz Challenge\nI scored " + score + "/" + roundLength + " — " + rank.title + " " + rank.emoji + "\n(" + settings + ")\nCan you beat me?";
  const url = window.location.href;
  const note = document.getElementById("shareNote");
  if (navigator.share) {
    navigator.share({ title: "Flag Quiz Challenge", text: text, url: url }).catch(() => {});
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text + "\n" + url).then(
      () => { if (note) note.textContent = "Score copied to clipboard!"; },
      () => { if (note) note.textContent = "Couldn't copy — try selecting the text above."; }
    );
  } else if (note) {
    note.textContent = "Your score: " + score + "/" + roundLength + " — " + rank.title;
  }
}

renderStart();
</script>
