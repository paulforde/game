<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Challenge</title>
<meta name="theme-color" content="#3b82f6" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #f0fdfa 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; min-height: 100%;
  }
  .card {
    background: #fff; border-radius: 24px; padding: 28px; width: 100%;
    max-width: 460px; box-shadow: 0 20px 50px rgba(15,23,42,0.12); text-align: center;
  }
  h1 { margin: 0 0 8px; color: #0f172a; font-size: 30px; font-weight: 800; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .pill { font-size: 13px; font-weight: 700; padding: 6px 12px; border-radius: 99px; background: #eff6ff; color: #2563eb; }
  .pill.score { background: #ecfdf5; color: #059669; }
  .progress { width: 100%; height: 8px; background: #e2e8f0; border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress > div { height: 100%; background: #3b82f6; transition: width 0.3s; }
  .timer-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .timer-bar { flex: 1; height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .timer-bar > div { height: 100%; width: 100%; background: #3b82f6; }
  .timer-num { font-size: 13px; font-weight: 800; color: #2563eb; min-width: 34px; text-align: right; }
  .flag-box {
    width: 100%; height: 170px; background: #f8fafc; border-radius: 14px;
    border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; padding: 14px;
  }
  .prompt-box {
    width: 100%; min-height: 170px; background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0;
    display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
    font-size: 30px; font-weight: 800; color: #0f172a; text-align: center; line-height: 1.25;
  }
  .flag-img { max-height: 100%; max-width: 100%; object-fit: contain; display: block; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
  .flag-emoji { font-size: 110px; line-height: 1; }
  .prompt { color: #64748b; margin: 16px 0 18px; font-size: 15px; font-weight: 600; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    padding: 16px 18px; border-radius: 14px; border: 2px solid #e2e8f0; background: #fff;
    color: #0f172a; font-size: 17px; font-weight: 600; text-align: left; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .opt.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; }
  .opt.wrong { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
  .opt.dim { color: #94a3b8; }
  .opt:disabled { cursor: default; }
  .intro { color: #64748b; margin: 0 0 8px; font-size: 16px; line-height: 1.5; }
  .seg-label { font-size: 12px; font-weight: 800; color: #94a3b8; letter-spacing: 0.6px; text-transform: uppercase; margin: 22px 0 8px; text-align: left; }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 12px 0; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff;
    color: #0f172a; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .seg button.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .big-emoji { font-size: 64px; margin-bottom: 8px; }
  .final-score { font-size: 28px; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
  .rank { font-size: 20px; font-weight: 600; color: #3b82f6; margin: 0 0 18px; }
  .best-line { font-size: 14px; font-weight: 700; color: #64748b; margin: 14px 0 0; min-height: 18px; }
  .newbest { font-size: 15px; font-weight: 800; color: #059669; margin: 14px 0 0; }
  .reset-link { font-size: 12px; color: #94a3b8; margin: 18px 0 0; cursor: pointer; text-decoration: underline; }
  .btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none; background: #3b82f6;
    color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 20px rgba(59,130,246,0.35); font-family: inherit; margin-top: 14px;
  }
  .btn.secondary { background: #fff; color: #3b82f6; border: 2px solid #3b82f6; box-shadow: none; }
  .btn.start { margin-top: 26px; }
  .share-note { font-size: 13px; color: #059669; font-weight: 700; margin: 14px 0 0; min-height: 16px; }
  .notes { text-align: left; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px 18px; margin-top: 18px; }
  .notes-title { font-size: 12px; font-weight: 800; color: #94a3b8; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; }
  .note-item { font-size: 13.5px; line-height: 1.5; color: #475569; margin: 0 0 10px; }
  .note-item:last-child { margin-bottom: 0; }
</style>

const BY_CODE = {};

const LOOKALIKE_GROUPS = [
  ["td","ro","ad","md"], ["id","mc","pl"], ["nl","lu","ru"], ["si","sk","rs","ru"],
  ["ie","ci","it","mx"], ["no","is","dk","se","fi"], ["co","ec","ve"], ["ae","kw","jo","sd"],

  ["sv","ni","hn"], ["in","ne"], ["qa","bh"], ["cr","th"],
];
const GROUPS_BY_CODE = {};
LOOKALIKE_GROUPS.forEach(g => g.forEach(c => { (GROUPS_BY_CODE[c] = GROUPS_BY_CODE[c] || []).push(g); }));

const LOOKALIKE_CHANCE = 0.35;
const LENGTH_OPTIONS = [15, 20, 25];
const CHOICE_OPTIONS = [3, 4, 5];
const TIME_OPTIONS = [5, 10, 0]; // 0 = Off
const STORE_KEY = "quizchallenge_highscores";

// ----- labels -----
function modeTitle() {
  if (gameType === "flag") return "🌍 Flag Challenge";
  return capitalDir === "cap2country" ? "🏛️ Capital → Country" : "🏛️ Country → Capital";
}
function promptLabel() {
  if (gameType === "flag") return "Which country is this?";
  return capitalDir === "cap2country" ? "Which country's capital is this?" : "What is the capital?";
}
function optionText(country) {
  return (gameType === "capital" && capitalDir === "country2cap") ? country.capital : country.name;
}

// ----- high score storage (per game + direction + settings) -----
function bestKey() {
  const g = gameType === "flag" ? "flag" : "cap_" + capitalDir;
  return g + "|" + roundLength + "|" + numChoices + "|" + timeLimit;
}
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (e) { return {}; }
}
function getBest(key) { return loadScores()[key] || null; }
function recordScore(key, sc, total) {
  const all = loadScores();
  const prev = all[key];
  if (!prev || sc > prev.score) {
    all[key] = { score: sc, total: total };
    try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch (e) {}
  }
}
function resetScores() { try { localStorage.removeItem(STORE_KEY); } catch (e) {} }

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function citiesOf(c) { return [c.capital].concat(CITY_EXTRAS[c.code] || []); }

function buildRound(length, choices, game) {
  const picks = shuffle(COUNTRIES).slice(0, length);
  return picks.map(correct => {
    const decoyCount = choices - 1;
    let promptType, promptValue, options;

    if (game === "flag") {
      promptType = "flag"; promptValue = correct.code;
      let decoys = [];
      const groups = GROUPS_BY_CODE[correct.code];
      if (groups && Math.random() < LOOKALIKE_CHANCE) {
        const group = groups[Math.floor(Math.random() * groups.length)];
        decoys = shuffle(COUNTRIES.filter(c => c.code !== correct.code && group.includes(c.code))).slice(0, decoyCount);
      }
      if (decoys.length < decoyCount) {
        const used = new Set([correct.code, ...decoys.map(d => d.code)]);
        decoys = decoys.concat(shuffle(COUNTRIES.filter(c => !used.has(c.code))).slice(0, decoyCount - decoys.length));
      }
      options = [{ label: correct.name, correct: true }]
        .concat(decoys.map(c => ({ label: c.name, correct: false })));

    } else if (capitalDir === "cap2country") {
      // Show the capital, pick the country — decoys mix neighbours + regional countries.
      promptType = "text"; promptValue = correct.capital;
      let codes = (NEIGHBOURS[correct.code] || []).concat(regionPeers(correct.code).map(c => c.code));
      codes = codes.filter((v, i, a) => v !== correct.code && a.indexOf(v) === i);
      let peers = shuffle(codes).slice(0, decoyCount).map(code => BY_CODE[code]).filter(Boolean);
      if (peers.length < decoyCount) {
        const used = new Set([correct.code, ...peers.map(p => p.code)]);
        peers = peers.concat(shuffle(COUNTRIES.filter(c => !used.has(c.code))).slice(0, decoyCount - peers.length));
      }
      options = [{ label: correct.name, correct: true }]
        .concat(peers.map(c => ({ label: c.name, correct: false })));

    } else {
      // Show the country, pick the capital — decoys mix the country's own cities,
      // neighbours' cities & capitals, and regional cities & capitals (randomised each time).
      promptType = "text"; promptValue = correct.name;
      const region = CODE_REGION[correct.code];
      let pool = [];
      pool = pool.concat(CITY_EXTRAS[correct.code] || []);
      (NEIGHBOURS[correct.code] || []).forEach(nc => { if (BY_CODE[nc]) pool = pool.concat(citiesOf(BY_CODE[nc])); });
      pool = pool.concat(regionPeers(correct.code).map(c => c.capital));
      pool = pool.concat(EXTRA_CITIES_BY_REGION[region] || []);
      pool = pool.filter(l => l && l !== correct.capital);
      const seen = new Set();
      pool = pool.filter(l => seen.has(l) ? false : (seen.add(l), true));
      let decoys = shuffle(pool).slice(0, decoyCount);
      if (decoys.length < decoyCount) {
        const used = new Set([correct.capital, ...decoys]);
        const more = shuffle(COUNTRIES.filter(c => c.code !== correct.code).map(c => c.capital)).filter(cap => !used.has(cap));
        decoys = decoys.concat(more.slice(0, decoyCount - decoys.length));
      }
      options = [{ label: correct.capital, correct: true }]
        .concat(decoys.map(l => ({ label: l, correct: false })));
    }

    return { code: correct.code, promptType, promptValue, options: shuffle(options) };
  });
}

function getRank(sc, length) {
  const p = sc / length;
  if (p === 1) return { title: "Flawless! Geography Legend", emoji: "🏆" };
  if (p >= 0.9) return { title: "Geography Whiz", emoji: "🌟" };
  if (p >= 0.75) return { title: "Globe Trotter", emoji: "✈️" };
  if (p >= 0.6) return { title: "Map Reader", emoji: "🗺️" };
  if (p >= 0.4) return { title: "Casual Explorer", emoji: "🧭" };
  return { title: "Just Getting Started", emoji: "🌱" };
}

function makeFlag(code) {
  const sources = [
    "https://flagcdn.com/w640/" + code + ".png",
    "https://flagicons.lipis.dev/flags/4x3/" + code + ".svg",
    "https://hatscripts.github.io/circle-flags/flags/" + code + ".svg",
  ];
  let i = 0;
  const img = document.createElement("img");
  img.className = "flag-img";
  img.alt = "Flag to identify";
  img.src = sources[0];
  img.onerror = () => {
    i++;
    if (i < sources.length) { img.src = sources[i]; }
    else {
      const span = document.createElement("span");
      span.className = "flag-emoji";
      span.textContent = code.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
      img.replaceWith(span);
    }
  };
  return img;
}

// ----- settings screen -----
function buildSeg(container, options, currentVal, labelFn, onSelect) {
  options.forEach(opt => {
    const b = document.createElement("button");
    b.textContent = labelFn(opt);
    if (opt === currentVal) b.classList.add("active");
    b.onclick = () => {
      onSelect(opt);
      container.querySelectorAll("button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      updateBestLine();
    };
    container.appendChild(b);
  });
}

function updateBestLine() {
  const el = document.getElementById("bestLine");
  if (!el) return;
  const best = getBest(bestKey());
  el.textContent = best ? ("Best for this mode: " + best.score + "/" + best.total) : "No score yet for this mode";
}

function renderSettings() {
  clearTimer();
  app.innerHTML =
    '<div class="card">' +
      '<h1>' + modeTitle() + '</h1>' +
      '<p class="intro">Pick your settings, then play.</p>' +
      '<div class="seg-label">Number of questions</div>' +
      '<div class="seg" id="lengthSeg"></div>' +
      '<div class="seg-label">Choices per question</div>' +
      '<div class="seg" id="choiceSeg"></div>' +
      '<div class="seg-label">Time per question</div>' +
      '<div class="seg" id="timeSeg"></div>' +
      '<p class="best-line" id="bestLine"></p>' +
      '<button class="btn start" id="startBtn">Start Round</button>' +
      '<p class="reset-link" id="backLink">← Back</p>' +
    '</div>';

  buildSeg(document.getElementById("lengthSeg"), LENGTH_OPTIONS, roundLength, n => n, n => { roundLength = n; });
  buildSeg(document.getElementById("choiceSeg"), CHOICE_OPTIONS, numChoices, c => c, c => { numChoices = c; });
  buildSeg(document.getElementById("timeSeg"), TIME_OPTIONS, timeLimit, t => t === 0 ? "Off" : t + "s", t => { timeLimit = t; });
  updateBestLine();

  document.getElementById("startBtn").onclick = startRound;
  document.getElementById("backLink").onclick = () => { gameType === "capital" ? renderCapitalMode() : renderHome(); };
}

function startRound() {
  round = buildRound(roundLength, numChoices, gameType); idx = 0; score = 0; locked = false;
  renderQuestion();
}

function clearTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

function startTimer() {
  const total = timeLimit;
  const fill = document.getElementById("timerFill");
  const num = document.getElementById("timerNum");
  const startAt = Date.now();
  function tick() {
    const remaining = Math.max(0, total - (Date.now() - startAt) / 1000);
    if (fill) fill.style.width = (remaining / total) * 100 + "%";
    if (num) num.textContent = Math.ceil(remaining) + "s";
    if (remaining <= 3) {
      if (fill) fill.style.background = "#ef4444";
      if (num) num.style.color = "#ef4444";
    }
    if (remaining <= 0) { clearTimer(); timeUp(); }
  }
  tick();
  timerId = setInterval(tick, 100);
}

function renderQuestion() {
  clearTimer();
  const q = round[idx];
  locked = false;
  const timerHtml = timeLimit > 0
    ? '<div class="timer-wrap"><div class="timer-bar"><div id="timerFill"></div></div><span class="timer-num" id="timerNum">' + timeLimit + 's</span></div>'
    : '';
  const promptArea = q.promptType === "flag"
    ? '<div class="flag-box" id="flagBox"></div>'
    : '<div class="prompt-box">' + q.promptValue + '</div>';
  app.innerHTML =
    '<div class="card">' +
      '<div class="topbar">' +
        '<span class="pill">Question ' + (idx + 1) + ' / ' + roundLength + '</span>' +
        '<span class="pill score">Score: ' + score + '</span>' +
      '</div>' +
      '<div class="progress"><div style="width:' + ((idx / roundLength) * 100) + '%"></div></div>' +
      timerHtml +
      promptArea +
      '<p class="prompt">' + promptLabel() + '</p>' +
      '<div class="options" id="options"></div>' +
    '</div>';

  if (q.promptType === "flag") document.getElementById("flagBox").appendChild(makeFlag(q.promptValue));

  const optWrap = document.getElementById("options");
  q.options.forEach(opt => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = opt.label;
    if (opt.correct) b.dataset.correct = "1";
    b.onclick = () => pick(opt, b);
    optWrap.appendChild(b);
  });

  if (timeLimit > 0) startTimer();
}

function revealCorrect(pickedBtn) {
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === "1") b.classList.add("correct");
    else if (b === pickedBtn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
}

function pick(opt, btn) {
  if (locked) return;
  locked = true;
  clearTimer();
  revealCorrect(btn);
  if (opt.correct) score++;
  setTimeout(advance, 1100);
}

function timeUp() {
  if (locked) return;
  locked = true;
  revealCorrect(null);
  setTimeout(advance, 1300);
}

function advance() {
  if (idx + 1 >= roundLength) renderDone();
  else { idx++; renderQuestion(); }
}

function renderDone() {
  clearTimer();
  const rank = getRank(score, roundLength);
  const key = bestKey();
  const prev = getBest(key);
  const isNewBest = !prev || score > prev.score;
  recordScore(key, score, roundLength);
  const best = getBest(key);
  const bestHtml = isNewBest
    ? '<p class="newbest">🎉 New personal best for this mode!</p>'
    : '<p class="best-line">Best for this mode: ' + best.score + '/' + best.total + '</p>';

  let notesHtml = "";
  if (gameType === "capital") {
    const seen = new Set();
    const notes = [];
    round.forEach(q => {
      if (CAPITAL_NOTES[q.code] && !seen.has(q.code)) {
        seen.add(q.code);
        notes.push(CAPITAL_NOTES[q.code]);
      }
    });
    if (notes.length) {
      notesHtml = '<div class="notes"><div class="notes-title">Good to know</div>' +
        notes.map(n => '<p class="note-item">' + n + '</p>').join("") + '</div>';
    }
  }

  app.innerHTML =
    '<div class="card">' +
      '<div class="big-emoji">' + rank.emoji + '</div>' +
      '<p class="final-score">' + score + ' / ' + roundLength + '</p>' +
      '<p class="rank">' + rank.title + '</p>' +
      bestHtml +
      notesHtml +
      '<button class="btn start" id="againBtn">Play Again</button>' +
      '<button class="btn secondary" id="shareBtn">Share my score</button>' +
      '<p class="share-note" id="shareNote"></p>' +
      '<p class="reset-link" id="homeLink">← Choose another challenge</p>' +
    '</div>';
  document.getElementById("againBtn").onclick = renderSettings;
  document.getElementById("shareBtn").onclick = shareScore;
  document.getElementById("homeLink").onclick = renderHome;
}

function shareScore() {
  const rank = getRank(score, roundLength);
  let heading;
  if (gameType === "flag") heading = "🌍 Flag Challenge";
  else heading = capitalDir === "cap2country" ? "🏛️ Capital Challenge (name the country)" : "🏛️ Capital Challenge (name the capital)";
  const settings = roundLength + " questions · " + numChoices + " choices · " + (timeLimit === 0 ? "no timer" : timeLimit + "s");
  const text = heading + "\nI scored " + score + "/" + roundLength + " — " + rank.title + " " + rank.emoji + "\n(" + settings + ")\nCan you beat me?";
  const url = window.location.href;
  const note = document.getElementById("shareNote");
  if (navigator.share) {
    navigator.share({ title: "Quiz Challenge", text: text, url: url }).catch(() => {});
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text + "\n" + url).then(
      () => { if (note) note.textContent = "Score copied to clipboard!"; },
      () => { if (note) note.textContent = "Couldn't copy — try selecting the text above."; }
    );
  } else if (note) {
    note.textContent = "Your score: " + score + "/" + roundLength + " — " + rank.title;
  }
}

renderHome();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
